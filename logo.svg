<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sock 2 Compliance Badge">
  <defs>
    <path id="topArc" d="M 75,200 A 125,125 0 0,1 325,200" fill="none"/>
    <path id="bottomArc" d="M 75,210 A 125,125 0 0,0 325,210" fill="none"/>

    <g id="sock">
      <!-- Sock body: cuff (top), tube (middle), foot pointing right -->
      <path d="M -25,-60 L 25,-60 L 25,30 L 90,30 Q 100,30 100,42 L 100,52 Q 100,62 90,62 L -25,62 L -32,62 Q -36,55 -32,50 L -25,50 Z"
            fill="#f0dfa8" stroke="#0a2540" stroke-width="3" stroke-linejoin="round"/>
      <!-- Navy cuff band -->
      <rect x="-25" y="-60" width="50" height="18" fill="#0a2540"/>
      <!-- Gold cuff stripes -->
      <line x1="-25" y1="-52" x2="25" y2="-52" stroke="#d4a017" stroke-width="2"/>
      <line x1="-25" y1="-46" x2="25" y2="-46" stroke="#d4a017" stroke-width="2"/>
      <!-- Toe cap -->
      <path d="M 85,30 L 90,30 Q 100,30 100,42 L 100,52 Q 100,62 90,62 L 85,62 Z" fill="#0a2540"/>
      <!-- Heel patch -->
      <path d="M -25,50 L -32,50 Q -36,55 -32,62 L -25,62 Z" fill="#0a2540"/>
    </g>
  </defs>

  <!-- Outer navy disc with gold rings (compliance-seal look) -->
  <circle cx="200" cy="200" r="198" fill="#0a2540"/>
  <circle cx="200" cy="200" r="184" fill="none" stroke="#d4a017" stroke-width="3"/>
  <circle cx="200" cy="200" r="177" fill="none" stroke="#d4a017" stroke-width="1"/>

  <!-- Cream inner field -->
  <circle cx="200" cy="200" r="155" fill="#f5e8c8"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#d4a017" stroke-width="2"/>
  <circle cx="200" cy="200" r="148" fill="none" stroke="#0a2540" stroke-width="1" stroke-dasharray="3 3" opacity="0.45"/>

  <!-- Curved title text (top of badge) -->
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="22" fill="#0a2540" letter-spacing="6">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">SOCK 2 COMPLIANCE</textPath>
  </text>

  <!-- Curved subtitle (bottom of badge) -->
  <text font-family="Georgia, serif" font-style="italic" font-size="13" fill="#0a2540" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">★ TYPE II ATTESTED ★ NO HOLES ★ YARN SECURE ★</textPath>
  </text>

  <!-- Clothesline -->
  <line x1="95" y1="155" x2="305" y2="155" stroke="#8a6a30" stroke-width="1.5"/>

  <!-- Left sock (mirrored, foot points left) -->
  <g transform="translate(170,200) scale(-0.6,0.6)">
    <use href="#sock"/>
  </g>

  <!-- Right sock (foot points right) -->
  <g transform="translate(230,200) scale(0.6,0.6)">
    <use href="#sock"/>
  </g>

  <!-- Clothespins -->
  <rect x="166" y="150" width="8" height="12" fill="#a87b3a" stroke="#5e4218" stroke-width="0.8" rx="1.5"/>
  <rect x="226" y="150" width="8" height="12" fill="#a87b3a" stroke="#5e4218" stroke-width="0.8" rx="1.5"/>

</svg>
